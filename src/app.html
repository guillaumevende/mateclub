<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<title>Maté Club</title>
		
		<!-- Favicon -->
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" href="%sveltekit.assets%/icon-192x192.png" sizes="192x192" type="image/png" />
		
		<!-- Apple Touch Icon (iOS) -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#e94560" />
		<meta name="description" content="Maté Club - Votre podcast quotidien entre amis" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.register('/sw.js').then(registration => {
					// Écouter les mises à jour du Service Worker
					registration.addEventListener('updatefound', () => {
						const newWorker = registration.installing;
						newWorker.addEventListener('statechange', () => {
							if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
								// Nouveau SW installé et ancien SW actif = mise à jour disponible
								console.log('New version available! Reloading...');
								// Forcer le rechargement pour utiliser le nouveau SW
								window.location.reload();
							}
						});
					});
				}).catch(err => {
					console.error('SW registration failed:', err);
				});
			}
		</script>
	</body>
</html>
