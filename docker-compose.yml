services:
  mateclub:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=${PORT:-3001}
      - BODY_SIZE_LIMIT=20M
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${PORT:-3001}"]
      interval: 30s
      timeout: 10s
      retries: 3
networks:
  default:
    name: mateclub-network
